version: '3.8'

services:
  # MySQL Database Container (Development Only)
  mysql:
    image: mysql:8.0
    container_name: scentify_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scentify_db
      MYSQL_USER: scentify_user
      MYSQL_PASSWORD: scentify_password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
