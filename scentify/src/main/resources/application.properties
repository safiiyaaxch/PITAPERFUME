# ============================================
# BASE URL - CRITICAL FOR DEPLOYMENT
# ============================================
app.base-url=pitaperfume-production.up.railway.app
app.payment.return-url=${app.base-url}/payment/return
app.payment.callback-url=${app.base-url}/payment/callback

# ============================================
# LOCAL DEVELOPMENT (Docker)
# ============================================
# PORT - Railway provides this automatically
server.port=${PORT:8080}

# Database - Railway provides these environment variables
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ============================================
# ADDITIONAL CONNECTION OPTIONS
# ============================================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# Add these lines:
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true
debug=true
logging.level.root=INFO
logging.level.com.scentify=DEBUG

# DISABLE ALL SECURITY AUTOCONFIGURATION
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

