<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" type="image/png" href="/image/favicon.png">
    <title>Supplier Details - Scentify</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #D4A574 0%, #A0826D 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #8B6F47;
            font-size: 24px;
        }

        .back-btn, .logout-btn {
            background: #8B6F47;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            margin-left: 10px;
        }

        .back-btn:hover, .logout-btn:hover {
            background: #6B5438;
        }

        .logout-btn {
            background: #e74c3c;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #8B6F47;
            margin-bottom: 20px;
            font-size: 28px;
            border-bottom: 2px solid #D4A574;
            padding-bottom: 10px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-item {
            background: #F5F1ED;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #D4A574;
        }

        .detail-item label {
            color: #8B6F47;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .detail-item p {
            color: #333;
            font-size: 16px;
            word-break: break-word;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .document-section {
            background: #F5F1ED;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #A0826D;
        }

        .document-section label {
            color: #A0826D;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .document-link {
            display: inline-block;
            background: #8B6F47;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .document-link:hover {
            background: #6B5438;
            transform: translateY(-2px);
        }

        .no-document {
            color: #999;
            font-style: italic;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn-approve {
            background: #27ae60;
            color: white;
        }

        .btn-approve:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-reject {
            background: #e74c3c;
            color: white;
        }

        .btn-reject:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-back {
            background: #8B6F47;
            color: white;
        }

        .btn-back:hover {
            background: #6B5438;
            transform: translateY(-2px);
        }

        .status-actions {
            display: none;
        }

        .status-actions.show {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        .info-note {
            background: #e8f4f8;
            padding: 10px 15px;
            border-radius: 5px;
            border-left: 4px solid #2196F3;
            margin-bottom: 20px;
            color: #0c5460;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Supplier Details</h1>
            <div>
                <a href="/manager/dashboard" class="back-btn">Back</a>
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </div>

        <div class="content">
            <!-- Supplier Name -->
            <h2 th:text="${supplier.brandName}"></h2>
            
            <!-- Status Badge -->
            <span th:class="'status-badge status-' + ${supplier.approvalStatus.toLowerCase()}" 
                  th:text="${supplier.approvalStatus.toUpperCase()}"></span>

            <!-- Main Details -->
            <div class="details-grid">
                <div class="detail-item">
                    <label>Brand Name</label>
                    <p th:text="${supplier.brandName}"></p>
                </div>
                <div class="detail-item">
                    <label>Username</label>
                    <p th:text="${supplier.user.username}"></p>
                </div>
                <div class="detail-item">
                    <label>Email Address</label>
                    <p th:text="${supplier.user.email}"></p>
                </div>
                <div class="detail-item">
                    <label>Applied Date</label>
                    <p th:text="${#temporals.format(supplier.createdDate, 'yyyy-MM-dd HH:mm:ss')}"></p>
                </div>
                <div class="detail-item" th:if="${supplier.approvalDate != null}">
                    <label>Approval Date</label>
                    <p th:text="${#temporals.format(supplier.approvalDate, 'yyyy-MM-dd HH:mm:ss')}"></p>
                </div>
            </div>

            <!-- Business Documentation -->
            <div class="document-section">
                <label>Business Documentation</label>
                <div th:if="${supplier.businessRegistration}">
                    <p style="color: #333; margin-bottom: 10px;">
                        <strong>File:</strong> <span th:text="${supplier.businessRegistration}"></span>
                    </p>
                    <a th:href="@{/uploads/business-docs/{file}(file=${supplier.businessRegistration})}" 
                       class="document-link" target="_blank">
                        Download PDF
                    </a>
                </div>
                <p th:if="!${supplier.businessRegistration}" class="no-document">
                    No business documentation provided
                </p>
            </div>

            <!-- Actions -->
            <div class="actions">
                <a href="/manager/dashboard" class="btn btn-back">Back to Dashboard</a>
                
                <!-- Show approve/reject buttons only for pending suppliers -->
                <div th:if="${supplier.approvalStatus.toLowerCase() == 'pending'}" class="status-actions show">
                    <form th:action="@{/manager/suppliers/{id}/approve(id=${supplier.supplierId})}" method="POST" style="flex: 1;">
                        <button type="submit" class="btn btn-approve">Approve Supplier</button>
                    </form>
                    <form th:action="@{/manager/suppliers/{id}/reject(id=${supplier.supplierId})}" method="POST" style="flex: 1;">
                        <button type="submit" class="btn btn-reject">Reject Supplier</button>
                    </form>
                </div>
            </div>

            <!-- Info Note for Non-Pending Suppliers -->
            <div th:if="${supplier.approvalStatus.toLowerCase() != 'pending'}" class="info-note">
                This supplier has been <strong th:text="${supplier.approvalStatus.toLowerCase()}"></strong>. 
                No further actions are required at this time.
            </div>
        </div>
    </div>
</body>
</html>
