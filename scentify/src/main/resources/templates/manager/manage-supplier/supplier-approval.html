<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Supplier - Scentify</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fdfcfa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            background: white;
            padding: 16px 28px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(62, 58, 54, 0.06);
            border: 1px solid #f0e8e0;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .header-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #3E3A36;
        }

        .header-left h1 i {
            color: #C4A484;
            margin-right: 0.4rem;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-back {
            background: #E6D3C1;
            color: #3E3A36;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-back:hover {
            background: #d4c4b0;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #2C2C2C;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .logout-btn:hover {
            background: #1a1a1a;
            transform: translateY(-2px);
        }

        /* ===== ALERTS ===== */
        .alerts {
            margin-bottom: 18px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .alert-success {
            background: #eef6f1;
            color: #2f6b47;
            border: 1px solid #d4e8dc;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .alert-error {
            background: #f8ecec;
            color: #8b2f2f;
            border: 1px solid #f0d6d6;
        }

        /* ===== DETAILS CONTAINER ===== */
        .details-container {
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(62, 58, 54, 0.06);
            border: 1px solid #f0e8e0;
            padding: 24px;
            margin-bottom: 25px;
        }

        .supplier-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0e8e0;
        }

        .supplier-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #3E3A36;
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            gap: 12px;
            margin-bottom: 6px;
            font-size: 13px;
            align-items: baseline;
        }

        .info-label {
            font-weight: 600;
            color: #3E3A36;
            min-width: 110px;
            font-size: 12px;
        }

        .info-value {
            color: #666;
            font-size: 13px;
        }

        /* ===== STATUS BADGE ===== */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        /* ===== PDF SECTION - COMPACT ===== */
        .pdf-section {
            margin: 20px 0 0 0;
            padding: 18px 20px;
            background: #f8f7f5;
            border-radius: 10px;
            border: 1px solid #e8e0d8;
        }

        .pdf-section h4 {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            color: #3E3A36;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pdf-section h4 i {
            color: #e74c3c;
            font-size: 16px;
        }

        .pdf-viewer {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            height: 320px;
            margin-bottom: 10px;
        }

        .pdf-viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ===== PDF BUTTONS - SMALL & EVEN ===== */
        .pdf-buttons {
            display: flex;
            gap: 8px;
        }

        .pdf-btn {
            padding: 6px 14px;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            cursor: pointer;
            flex: 1;
            min-height: 34px;
        }

        .pdf-btn:hover {
            transform: translateY(-1px);
        }

        .pdf-btn-view {
            background: #C4A484;
            color: white;
        }

        .pdf-btn-view:hover {
            background: #9d8970;
            box-shadow: 0 3px 10px rgba(196, 164, 132, 0.3);
        }

        .pdf-btn-download {
            background: #48c6a6;
            color: white;
        }

        .pdf-btn-download:hover {
            background: #3ab89a;
            box-shadow: 0 3px 10px rgba(72, 198, 166, 0.3);
        }

        .pdf-btn i {
            font-size: 12px;
        }

        .pdf-btn-no {
            padding: 15px;
            text-align: center;
            color: #999;
            font-size: 13px;
        }

        .pdf-btn-no i {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
            color: #ccc;
        }

        /* ===== APPROVAL FORM ===== */
        .approval-form {
            background: white;
            border-radius: 14px;
            padding: 24px;
            border: 2px solid #C4A484;
        }

        .approval-form h4 {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            color: #3E3A36;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-weight: 600;
            color: #3E3A36;
            margin-bottom: 6px;
            display: block;
            font-size: 13px;
        }

        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s ease;
        }

        .form-textarea:focus {
            border-color: #C4A484;
            outline: none;
            box-shadow: 0 0 0 3px rgba(196, 164, 132, 0.1);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-approve {
            background: #4caf50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-approve:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-reject {
            background: #f44336;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-reject:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        /* ===== ALREADY REVIEWED ===== */
        .already-reviewed {
            text-align: center;
            padding: 25px;
            color: #8A7F75;
            font-size: 14px;
        }

        .already-reviewed i {
            font-size: 36px;
            display: block;
            margin-bottom: 10px;
        }

        .already-reviewed.approved i { color: #4caf50; }
        .already-reviewed.rejected i { color: #f44336; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.8rem;
                padding: 16px;
            }
            .header-left h1 {
                font-size: 1.2rem;
            }
            .supplier-header {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .action-buttons {
                grid-template-columns: 1fr;
            }
            .pdf-viewer {
                height: 250px;
            }
            .pdf-buttons {
                flex-direction: column;
            }
            .pdf-btn {
                min-height: 32px;
            }
        }

        @media (max-width: 480px) {
            .details-container {
                padding: 16px;
            }
            .approval-form {
                padding: 16px;
            }
            .info-row {
                flex-direction: column;
                gap: 2px;
            }
            .info-label {
                min-width: auto;
                font-size: 11px;
            }
            .pdf-section {
                padding: 14px 16px;
            }
            .pdf-viewer {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1><i class="fas fa-store"></i> Review Supplier</h1>
            </div>
            <div class="header-actions">
                <a href="/manager/suppliers" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <a href="/logout" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>

        <!-- Alerts -->
        <div class="alerts">
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${warning}" class="alert alert-warning">
                <i class="fas fa-exclamation-triangle"></i>
                <span th:text="${warning}"></span>
            </div>
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
        </div>

        <!-- Supplier Details -->
        <div class="details-container">
            <div class="supplier-header">
                <div class="supplier-info">
                    <h3 th:text="${supplier.brandName}"></h3>
                    <div class="info-row">
                        <span class="info-label">Status:</span>
                        <span th:class="'status-badge status-' + ${supplier.approvalStatus.toLowerCase()}" 
                              th:text="${supplier.approvalStatus.toUpperCase()}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Username:</span>
                        <span class="info-value" th:text="${supplier.user.username}"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Email:</span>
                        <span class="info-value" th:text="${supplier.user.email}"></span>
                    </div>
                </div>

                <div class="supplier-info">
                    <h3>Application Details</h3>
                    <div class="info-row">
                        <span class="info-label">Applied Date:</span>
                        <span class="info-value" th:text="${#temporals.format(supplier.createdDate, 'MMM dd, yyyy HH:mm')}"></span>
                    </div>
                    <div class="info-row" th:if="${supplier.approvalDate != null}">
                        <span class="info-label">Review Date:</span>
                        <span class="info-value" th:text="${#temporals.format(supplier.approvalDate, 'MMM dd, yyyy HH:mm')}"></span>
                    </div>
                    <div class="info-row" th:if="${supplier.approvalNotes != null}">
                        <span class="info-label">Notes:</span>
                        <span class="info-value" th:text="${supplier.approvalNotes}"></span>
                    </div>
                </div>
            </div>

            <!-- PDF Section - Compact -->
            <div class="pdf-section">
                <h4>
                    <i class="fas fa-file-pdf"></i>
                    Business Documentation
                </h4>
                
                <div th:if="${supplier.businessRegistration != null}">
                    <div class="pdf-viewer">
                        <iframe th:src="@{/manager/suppliers/{id}/pdf(id=${supplier.supplierId})}"></iframe>
                    </div>

                    <div class="pdf-buttons">
                        <a th:href="@{/manager/suppliers/{id}/pdf(id=${supplier.supplierId})}" 
                           class="pdf-btn pdf-btn-view" target="_blank">
                            <i class="fas fa-eye"></i> View
                        </a>
                        <form th:action="@{/manager/suppliers/{id}/pdf(id=${supplier.supplierId})}" method="get" style="flex:1;">
                            <button type="submit" class="pdf-btn pdf-btn-download" style="width:100%;">
                                <i class="fas fa-download"></i> Download
                            </button>
                        </form>
                    </div>
                </div>

                <div th:if="${supplier.businessRegistration == null}" class="pdf-btn-no">
                    <i class="fas fa-info-circle"></i>
                    No business documentation provided
                </div>
            </div>
        </div>

        <!-- Approval Form -->
        <div th:if="${supplier.approvalStatus.toLowerCase() == 'pending'}" class="approval-form">
            <h4>Make a Decision</h4>
            
            <div class="form-group">
                <label class="form-label">Review Notes (Optional)</label>
                <textarea class="form-textarea" id="approvalNotes" placeholder="Add any notes about this application..."></textarea>
            </div>

            <div class="action-buttons">
                <button class="btn-approve" onclick="approveSupplier()">
                    <i class="fas fa-check"></i> Approve
                </button>
                <button class="btn-reject" onclick="rejectSupplier()">
                    <i class="fas fa-times"></i> Reject
                </button>
            </div>
        </div>

        <div th:if="${supplier.approvalStatus.toLowerCase() != 'pending'}" 
             th:class="'already-reviewed ' + ${supplier.approvalStatus.toLowerCase()}">
            <i class="fas fa-check-circle" th:if="${supplier.approvalStatus.toLowerCase() == 'approved'}"></i>
            <i class="fas fa-times-circle" th:if="${supplier.approvalStatus.toLowerCase() == 'rejected'}"></i>
            This supplier has already been <span th:text="${supplier.approvalStatus.toLowerCase()}"></span>
        </div>
    </div>

    <script th:inline="javascript">
        function approveSupplier() {
            const supplierId = /*[[${supplier.supplierId}]]*/ 0;
            const notes = document.getElementById('approvalNotes').value;
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/manager/suppliers/' + supplierId + '/approve';
            
            const notesInput = document.createElement('input');
            notesInput.type = 'hidden';
            notesInput.name = 'approvalNotes';
            notesInput.value = notes;
            
            form.appendChild(notesInput);
            document.body.appendChild(form);
            form.submit();
        }

        function rejectSupplier() {
            if (confirm('Are you sure you want to reject this supplier?')) {
                const supplierId = /*[[${supplier.supplierId}]]*/ 0;
                const notes = document.getElementById('approvalNotes').value;
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/manager/suppliers/' + supplierId + '/reject';
                
                const notesInput = document.createElement('input');
                notesInput.type = 'hidden';
                notesInput.name = 'approvalNotes';
                notesInput.value = notes;
                
                form.appendChild(notesInput);
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script>
</body>
</html>
