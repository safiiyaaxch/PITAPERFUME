<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Product - Supplier Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
     <link rel="icon" type="image/png" href="/image/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fdfcfa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(62, 58, 54, 0.06);
            border: 1px solid #f0e8e0;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .header-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #3E3A36;
        }

        .header-left h1 i {
            color: #C4A484;
            margin-right: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .welcome-text {
            color: #3E3A36;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: #2C2C2C;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn:hover {
            background: #1a1a1a;
            transform: translateY(-2px);
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #3E3A36;
        }

        .btn-back {
            background: #E6D3C1;
            color: #3E3A36;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-back:hover {
            background: #d4c4b0;
            transform: translateY(-2px);
        }

        /* ===== ALERTS ===== */
        .alerts {
            margin-bottom: 20px;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .alert-success {
            background: #eef6f1;
            color: #2f6b47;
            border: 1px solid #d4e8dc;
        }

        .alert-error {
            background: #f8ecec;
            color: #8b2f2f;
            border: 1px solid #f0d6d6;
        }

        /* ===== DETAILS CARD ===== */
        .details-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(62, 58, 54, 0.06);
            border: 1px solid #f0e8e0;
            overflow: hidden;
        }

        .details-card .card-header {
            background: #f5f0eb;
            padding: 1.2rem 1.5rem;
            border-bottom: 2px solid #f0e8e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .details-card .card-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #3E3A36;
        }

        .details-card .card-body {
            padding: 1.5rem;
        }

        /* ===== PRODUCT INFO ===== */
        .product-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            object-fit: cover;
            background: #f5f0eb;
            border: 1px solid #e8e0d8;
        }

        .product-image-placeholder {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            background: #f5f0eb;
            border: 1px solid #e8e0d8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 0.9rem;
        }

        .product-image-placeholder i {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            color: #ddd;
        }

        .product-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem 2rem;
        }

        .detail-item {
            padding: 0.6rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-item.full-width {
            grid-column: 1 / -1;
        }

        .detail-item .label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #8A7F75;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 2px;
        }

        .detail-item .value {
            font-size: 1rem;
            color: #3E3A36;
            font-weight: 500;
        }

        .detail-item .value.price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #C4A484;
        }

        /* ===== STATUS BADGE ===== */
        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        /* ===== ACTION BUTTONS ===== */
        .action-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #f0e8e0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-edit {
            background: #d4a574;
            color: white;
        }
        .btn-edit:hover {
            background: #c2936b;
            color: white;
        }

        .btn-delete {
            background: #a8796a;
            color: white;
        }
        .btn-delete:hover {
            background: #956253;
            color: white;
        }

        .btn-back-details {
            background: #E6D3C1;
            color: #3E3A36;
        }
        .btn-back-details:hover {
            background: #d4c4b0;
            color: #3E3A36;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.8rem;
                padding: 16px 20px;
            }
            .header-left h1 {
                font-size: 1.2rem;
            }
            .header-actions {
                flex-wrap: wrap;
            }
            .product-layout {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .product-image,
            .product-image-placeholder {
                max-width: 300px;
                margin: 0 auto;
            }
            .product-details {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            .detail-item.full-width {
                grid-column: 1;
            }
            .page-header {
                flex-direction: column;
                align-items: stretch;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .details-card .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .details-card .card-body {
                padding: 1rem;
            }
            .product-image,
            .product-image-placeholder {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1><i class="fas fa-store"></i> Supplier Dashboard</h1>
            </div>
            <div class="header-actions">
                <span class="welcome-text">
                    <i class="fas fa-user-circle"></i> Welcome, <span th:text="${user?.username}"></span>
                </span>
                <a href="/logout" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h2><i class="fas fa-box" style="color: #C4A484; margin-right: 0.5rem;"></i> Product Details</h2>
            <a th:href="@{/supplier/products}" class="btn-back">
                <i class="fas fa-arrow-left"></i> Back to Products
            </a>
        </div>

        <!-- Alerts -->
        <div class="alerts">
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
        </div>

        <!-- Details Card -->
        <div class="details-card">
            <div class="card-header">
                <h3 th:text="${product.productName}"></h3>
                <span class="status-badge" 
                      th:classappend="${'status-' + product.approvalStatus.toLowerCase()}"
                      th:text="${#strings.capitalize(product.approvalStatus)}"></span>
            </div>
            <div class="card-body">
                <div class="product-layout">
                    <!-- Product Image -->
                    <div>
                        <img th:if="${product.prodimage}" 
                             th:src="${product.prodimage}" 
                             alt="Product Image" 
                             class="product-image">
                        <div th:if="!${product.prodimage}" class="product-image-placeholder">
                            <i class="fas fa-image"></i>
                            <span>No Image</span>
                        </div>
                    </div>

                    <!-- Product Details -->
                    <div>
                        <div class="product-details">
                            <div class="detail-item">
                                <span class="label">Product ID</span>
                                <span class="value" th:text="${product.productId}"></span>
                            </div>
                            <div class="detail-item">
                                <span class="label">Category</span>
                                <span class="value" th:text="${product.category}"></span>
                            </div>
                            <div class="detail-item">
                                <span class="label">Price</span>
                                <span class="value price">RM <span th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></span></span>
                            </div>
                            <div class="detail-item">
                                <span class="label">Stock</span>
                                <span class="value" th:text="${product.stock} + ' units'"></span>
                            </div>
                            <div class="detail-item full-width">
                                <span class="label">Description</span>
                                <span class="value" th:text="${product.description}"></span>
                            </div>
                            <div class="detail-item full-width">
                                <span class="label">Added Date</span>
                                <span class="value" th:text="${#temporals.format(product.createdAt, 'dd MMM yyyy, HH:mm')}"></span>
                            </div>
                            <div class="detail-item full-width" th:if="${product.approvalStatus == 'APPROVED' && product.updatedAt}">
                                <span class="label">Approved Date</span>
                                <span class="value" th:text="${#temporals.format(product.updatedAt, 'dd MMM yyyy, HH:mm')}"></span>
                            </div>
                            <div class="detail-item full-width" th:if="${product.approvalStatus == 'REJECTED' && product.updatedAt}">
                                <span class="label">Rejected Date</span>
                                <span class="value" th:text="${#temporals.format(product.updatedAt, 'dd MMM yyyy, HH:mm')}"></span>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="action-buttons">
                            <a th:href="@{/supplier/products/edit/{id}(id=${product.productId})}" class="btn btn-edit">
                                <i class="fas fa-edit"></i> Edit Product
                            </a>
                            <a th:href="@{/supplier/products/delete/{id}(id=${product.productId})}" 
                               class="btn btn-delete"
                               onclick="return confirm('Are you sure you want to delete this product?');">
                                <i class="fas fa-trash"></i> Delete Product
                            </a>
                            <a th:href="@{/supplier/products}" class="btn btn-back-details">
                                <i class="fas fa-arrow-left"></i> Back to Products
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
