<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Scentify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #C4A484;
            --secondary-color: #E6D3C1;
            --accent-color: #FAF7F4;
            --text-dark: #3E3A36;
            --text-muted: #8A7F75;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: var(--text-dark);
        }

        .navbar {
            background: white;
            border-bottom: 1px solid #f0f0f0;
            padding: 1rem 0;
        }

        .navbar .container-fluid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark) !important;
        }

        .nav-link {
            color: var(--text-dark) !important;
            font-weight: 500;
            margin: 0 1rem;
        }

        .logout-btn {
            background: var(--primary-color);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #B89673;
            color: white;
            text-decoration: none;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .checkout-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .checkout-section {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .form-control {
            border: 1px solid #d4c5bd;
            border-radius: 4px;
            padding: 0.75rem;
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(196, 164, 132, 0.25);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .voucher-section {
            background: linear-gradient(135deg, #f0e8d8, #fdfcfa);
            border-left: 4px solid var(--primary-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .voucher-title {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .voucher-select {
            border: 1px solid var(--primary-color);
            border-radius: 4px;
            padding: 0.7rem;
            background: white;
            color: var(--text-dark);
            cursor: pointer;
            width: 100%;
        }

        .order-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 1rem;
            background: var(--accent-color);
        }

        .order-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
        }

        .order-item-details {
            flex: 1;
        }

        .order-item-name {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.3rem;
        }

        .order-item-qty {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .qty-btn-small {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 0.2rem 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            min-width: 28px;
        }

        .qty-btn-small:hover {
            background: #B89673;
        }

        .item-qty-input {
            width: 50px;
            padding: 0.3rem;
            border: 1px solid #ddd;
            border-radius: 3px;
            text-align: center;
            font-size: 0.85rem;
        }

        .order-item-price {
            font-weight: 600;
            color: var(--primary-color);
        }

        .summary-box {
            background: var(--accent-color);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid #e0e0e0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }

        .summary-row.total {
            border-top: 2px solid #e0e0e0;
            padding-top: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .summary-label {
            font-weight: 500;
        }

        .summary-value {
            text-align: right;
            font-weight: 600;
        }

        .pay-btn {
            background: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            margin-top: 1.5rem;
        }

        .pay-btn:hover {
            background: #B89673;
        }

        .back-btn {
            background: #E2D6CB;
            color: var(--text-dark);
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            margin-top: 1rem;
        }

        .back-btn:hover {
            background: #d4c2b0;
            color: var(--text-dark);
            text-decoration: none;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .qty-btn {
            background: #d4c5bd;
            color: #6b5b58;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .qty-btn:hover {
            background: #c2b0a3;
        }

        .qty-input {
            width: 50px;
            text-align: center;
            padding: 4px;
            border: 1px solid #d4c5bd;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/customer/dashboard">
                <i class="fas fa-leaf"></i> Scentify
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/customer/dashboard">
                    <i class="fas fa-home"></i> Home
                </a>
                <a class="nav-link" href="/customer/cart">
                    <i class="fas fa-shopping-cart"></i> Cart
                </a>
                <a class="nav-link logout-btn" href="/logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <h1 class="section-title" style="font-size: 1.8rem; margin-bottom: 2rem;">
            <i class="fas fa-credit-card"></i> Checkout
        </h1>

        <div class="checkout-container">
            <!-- Left Section: Delivery & Payment -->
            <div class="checkout-section">
                <!-- Delivery Address -->
                <div class="section-title">
                    <i class="fas fa-map-marker-alt"></i>
                    Delivery Address
                </div>

                <form method="post" id="checkoutForm" th:action="@{/customer/checkout-confirm}">
                    <div class="form-group">
                        <label class="form-label">Recipient Name</label>
                        <input type="text" class="form-control" name="recipientName" 
                               th:value="${customer.fullname}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" name="phoneNumber" 
                               th:value="${customer.phone}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Shipping Address</label>
                        <textarea class="form-control" name="shippingAddress" rows="3" required>[[${customer.address}]]</textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" name="city" 
                                   th:value="${customer.city}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Country</label>
                            <input type="text" class="form-control" name="country" 
                                   th:value="${customer.country}" required>
                        </div>
                    </div>

                    <!-- Voucher Section -->
                    <th:block th:if="${!availableVouchers.isEmpty()}">
                        <div class="voucher-section">
                            <div class="voucher-title">
                                <i class="fas fa-ticket-alt"></i> Apply Voucher (Member Only)
                            </div>
                            <select class="voucher-select" name="voucherId" id="voucherId" onchange="updateDiscount()">
                                <option value="">-- Select a Voucher --</option>
                                <option th:each="voucher : ${availableVouchers}" 
                                        th:value="${voucher.voucherId}"
                                        th:text="${voucher.voucherCode} + ' - ' + ${voucher.discountValue} + (${voucher.discountType == 'PERCENTAGE'} ? '%' : 'RM') + ' off'">
                                    Voucher
                                </option>
                            </select>
                        </div>
                    </th:block>

                    <th:block th:if="${availableVouchers.isEmpty()}">
                        <div style="background: #f0e8d8; padding: 1rem; border-radius: 4px; margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                            No vouchers available
                        </div>
                    </th:block>

                    <input type="hidden" name="cartId" th:value="${cart.cartId}">
                    
                    <!-- Payment Button - INSIDE FORM -->
                    <button type="button" class="pay-btn" onclick="processCheckout()" style="width: 100%; margin-top: 1.5rem;">
                        <i class="fas fa-credit-card"></i> Proceed to Payment
                    </button>
                    
                    <div style="font-size: 0.85rem; color: #8A7F75; margin-top: 1rem; text-align: center;">
                        <i class="fas fa-lock"></i> Secure payment via ToyyibPay (Cards • FPX • E-Wallets)
                    </div>
                </form>
            </div>

            <!-- Right Section: Order Summary -->
            <div class="checkout-section">
                <div class="section-title">
                    <i class="fas fa-box"></i>
                    Order Summary
                </div>

                <!-- Stock Warning -->
                <div th:each="item : ${cart.cartItems}" th:if="${item.product.stock < item.quantity}" style="background: #ffebee; border-left: 4px solid #c62828; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; color: #c62828;">
                    <i class="fas fa-exclamation-triangle"></i> 
                    <strong th:text="${item.product.productName}"></strong> has only 
                    <strong th:text="${item.product.stock}"></strong> units available.
                </div>

                <!-- Order Items (Cart) -->
                <th:block th:if="${!cart.cartItems.isEmpty()}">
                    <div th:each="item : ${cart.cartItems}" class="order-item" th:data-item-id="${item.cartItemId}" th:data-price="${item.product.price}">
                        <img th:src="${item.product.prodimage}" 
                             th:alt="${item.product.productName}"
                             class="order-item-image"
                             onerror="this.src='https://via.placeholder.com/80x80?text=No+Image'">
                        <div class="order-item-details">
                            <div class="order-item-name" th:text="${item.product.productName}">Product</div>
                            <div class="order-item-qty">
                                <button type="button" class="qty-btn-small" onclick="decreaseItemQty(this)">−</button>
                                <input type="number" class="item-qty-input" th:value="${item.quantity}" min="1" onchange="updateCheckoutTotal()">
                                <button type="button" class="qty-btn-small" onclick="increaseItemQty(this)">+</button>
                            </div>
                            <div class="order-item-price">
                                RM <span class="item-price-display" th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}">0.00</span>
                            </div>
                        </div>
                    </div>
                </th:block>

                <!-- Price Summary -->
                <div class="summary-box">
                    <div class="summary-row">
                        <span class="summary-label">Subtotal</span>
                        <span class="summary-value">RM <span id="subtotal" th:text="${#numbers.formatDecimal(cart.totalPrice, 1, 2)}">0.00</span></span>
                    </div>

                    <div class="summary-row">
                        <span class="summary-label">Delivery Cost</span>
                        <span class="summary-value">RM <span id="delivery">4.90</span></span>
                    </div>

                    <div class="summary-row">
                        <span class="summary-label">Discount</span>
                        <span class="summary-value">RM <span id="discount">0.00</span></span>
                    </div>

                    <div class="summary-row total">
                        <span class="summary-label">Total</span>
                        <span class="summary-value">RM <span id="total" th:text="${#numbers.formatDecimal(cart.totalPrice + 4.90, 1, 2)}">0.00</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 2rem; margin-bottom: 2rem;">
        <a href="/customer/cart" class="back-btn" style="display: inline-block;">
            <i class="fas fa-arrow-left"></i> Back to Cart
        </a>
    </div>

    <script>
        // Initialize vouchers array from server
        const vouchersData = /*[[${availableVouchers}]]*/ [];
        
        const subtotalAmount = /*[[${cart.totalPrice}]]*/ 0;
        const deliveryCost = 4.90;
        
        // Populate available vouchers from server data
        const availableVouchers = {};
        vouchersData.forEach(function(voucher) {
            const vid = String(voucher.voucherId); // Convert to string for consistency
            availableVouchers[vid] = {
                code: voucher.voucherCode,
                discountValue: parseFloat(voucher.discountValue),
                discountType: voucher.discountType,
                minPurchase: parseFloat(voucher.minPurchaseAmount) || 0
            };
            console.log('Loaded voucher: ' + vid + ' = ' + availableVouchers[vid].code + ' (' + availableVouchers[vid].discountType + ')');
        });

        // Get initial subtotal by summing all item prices
        function calculateCurrentSubtotal() {
            let total = 0;
            document.querySelectorAll('.order-item').forEach(item => {
                const price = parseFloat(item.dataset.price);
                const qty = parseInt(item.querySelector('.item-qty-input').value) || 1;
                total += price * qty;
            });
            return total;
        }

        function updateCheckoutTotal() {
            try {
                const currentSubtotal = calculateCurrentSubtotal();
                const voucherId = document.getElementById('voucherId');
                const voucherIdValue = voucherId ? voucherId.value : '';
                let discountAmount = 0;

                console.log('Update total - Selected voucher ID: ' + voucherIdValue);
                
                if (voucherIdValue && availableVouchers[voucherIdValue]) {
                    const voucher = availableVouchers[voucherIdValue];
                    console.log('Voucher found: ' + voucher.code + ', Type: ' + voucher.discountType + ', Value: ' + voucher.discountValue);
                    
                    if (voucher.discountType === 'PERCENTAGE') {
                        discountAmount = (currentSubtotal * voucher.discountValue) / 100;
                        console.log('Percentage discount: ' + voucher.discountValue + '% of RM' + currentSubtotal + ' = RM' + discountAmount);
                    } else if (voucher.discountType === 'FIXED_AMOUNT') {
                        discountAmount = parseFloat(voucher.discountValue);
                        console.log('Fixed amount discount: RM' + discountAmount);
                    }
                } else {
                    console.log('No voucher selected or voucher not found');
                }

                const total = currentSubtotal + deliveryCost - discountAmount;

                // Update all display values - use safe selectors
                const subtotalEl = document.getElementById('subtotal');
                const discountEl = document.getElementById('discount');
                const totalEl = document.getElementById('total');

                if (subtotalEl) subtotalEl.textContent = currentSubtotal.toFixed(2);
                if (discountEl) discountEl.textContent = discountAmount.toFixed(2);
                if (totalEl) totalEl.textContent = total.toFixed(2);

                console.log('Final total: RM' + total.toFixed(2));

                // Update individual item prices
                document.querySelectorAll('.order-item').forEach(item => {
                    const price = parseFloat(item.dataset.price) || 0;
                    const qtyInput = item.querySelector('.item-qty-input');
                    const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
                    const itemTotal = price * qty;
                    const itemPriceDisplay = item.querySelector('.item-price-display');
                    if (itemPriceDisplay) {
                        itemPriceDisplay.textContent = itemTotal.toFixed(2);
                    }
                });
            } catch (e) {
                console.error('Error updating checkout total: ' + e.message);
            }
        }

        function increaseItemQty(btn) {
            const input = btn.parentElement.querySelector('.item-qty-input');
            input.value = parseInt(input.value) + 1;
            updateCheckoutTotal();
        }

        function decreaseItemQty(btn) {
            const input = btn.parentElement.querySelector('.item-qty-input');
            if (parseInt(input.value) > 1) {
                input.value = parseInt(input.value) - 1;
                updateCheckoutTotal();
            }
        }

        function updateDiscount() {
            updateCheckoutTotal();
        }

        function processCheckout() {
            console.log('🔄 processCheckout() called');
            
            const form = document.getElementById('checkoutForm');
            console.log('📝 Form found: ' + (form ? 'YES' : 'NO'));
            
            if (!form) {
                console.error('❌ ERROR: checkoutForm not found!');
                alert('ERROR: Checkout form not found! Please refresh the page.');
                return false;
            }

            // Get all required fields
            const requiredFields = ['recipientName', 'phoneNumber', 'shippingAddress', 'city', 'country'];
            let isValid = true;
            let errorMsg = '';

            console.log('🔍 Validating ' + requiredFields.length + ' fields...');
            
            requiredFields.forEach(fieldId => {
                const field = document.querySelector(`[name="${fieldId}"]`);
                const hasValue = field && field.value && field.value.trim();
                console.log('   ' + fieldId + ': ' + (hasValue ? '✅ OK' : '❌ MISSING'));
                
                if (!hasValue) {
                    isValid = false;
                    errorMsg += fieldId + ' is required\n';
                }
            });

            if (!isValid) {
                console.error('❌ Validation failed:', errorMsg);
                alert('❌ PLEASE FILL IN ALL FIELDS:\n\n' + errorMsg);
                return false;
            }

            console.log('✅ All fields valid!');
            console.log('📍 Form action: ' + form.action);
            console.log('📍 Form method: ' + form.method);
            console.log('🚀 Submitting form...');
            
            try {
                // Prevent double submission
                const submitBtn = event.target;
                if (submitBtn) submitBtn.disabled = true;
                
                form.submit();
                console.log('✅ Form submitted successfully');
                return false; // Prevent default button behavior
            } catch (error) {
                console.error('❌ Error submitting form: ' + error.message);
                alert('❌ ERROR: ' + error.message);
                return false;
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ Checkout page loaded');
            console.log('🔍 Looking for checkout form...');
            const form = document.getElementById('checkoutForm');
            console.log('   Checkout form found: ' + (form ? 'YES' : 'NO'));
            
            if (form) {
                console.log('   Form action: ' + form.action);
                console.log('   Form method: ' + form.method);
            }
            
            console.log('🔍 Looking for payment button...');
            const payBtn = document.querySelector('.pay-btn');
            console.log('   Payment button found: ' + (payBtn ? 'YES' : 'NO'));
            if (payBtn) {
                console.log('   Button text: ' + payBtn.textContent.trim());
                console.log('   Button onclick: ' + payBtn.getAttribute('onclick'));
            }
            
            try {
                updateCheckoutTotal();
                console.log('✅ Initial total calculation done');
            } catch (e) {
                console.warn('⚠️ Warning updating total on load: ' + e.message);
            }
        });
    </script>
</body>
</html>
