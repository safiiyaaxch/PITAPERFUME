<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Recommendations - Scentify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .results-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .results-header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .results-header p {
            font-size: 1.2em;
        }
        
        .recommendations-container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .perfume-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            animation: scaleIn 0.6s ease-out forwards;
            opacity: 0;
            position: relative;
        }
        
        .perfume-card:nth-child(1) { animation-delay: 0.1s; }
        .perfume-card:nth-child(2) { animation-delay: 0.2s; }
        .perfume-card:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .perfume-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        
        .rank-badge {
            position: absolute;
            top: -15px;
            left: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .perfume-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
        }
        
        .perfume-details {
            padding: 40px 25px 25px;
        }
        
        .perfume-name {
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }
        
        .perfume-brand {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        
        .perfume-description {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 60px;
        }
        
        .perfume-specs {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85em;
        }
        
        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            color: #555;
        }
        
        .spec-label {
            font-weight: 600;
            color: #333;
        }
        
        .spec-value {
            color: #667eea;
        }
        
        .perfume-price {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .btn-add-cart {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-add-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            color: white;
            text-decoration: none;
        }
        
        .action-buttons {
            text-align: center;
            margin-top: 30px;
        }
        
        .btn-secondary-action {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-secondary-action:hover {
            background: #667eea;
            color: white;
        }
        
        .success-animation {
            animation: bounce 0.6s ease-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="results-header">
        <h1>🎉 Your Perfect Matches Found!</h1>
        <p>Based on your preferences, here are our top 3 recommendations</p>
    </div>
    
    <div class="recommendations-container">
        <th:block th:each="perfume, iterStat : ${recommendations}">
            <div class="perfume-card">
                <div class="rank-badge" th:text="${iterStat.count}"></div>
                <div class="perfume-image">
                    💐
                </div>
                <div class="perfume-details">
                    <div class="perfume-name" th:text="${perfume.productName}"></div>
                    <div class="perfume-brand" th:text="${perfume.brandName} ?: 'Premium Brand'"></div>
                    <div class="perfume-description" th:text="${perfume.description}"></div>
                    
                    <div class="perfume-specs">
                        <div class="spec-item" th:if="${perfume.fragranceFamily}">
                            <span class="spec-label">Family:</span>
                            <span class="spec-value" th:text="${perfume.fragranceFamily}"></span>
                        </div>
                        <div class="spec-item" th:if="${perfume.intensity}">
                            <span class="spec-label">Intensity:</span>
                            <span class="spec-value" th:text="${perfume.intensity}"></span>
                        </div>
                        <div class="spec-item" th:if="${perfume.season}">
                            <span class="spec-label">Season:</span>
                            <span class="spec-value" th:text="${perfume.season}"></span>
                        </div>
                        <div class="spec-item" th:if="${perfume.occasion}">
                            <span class="spec-label">Occasion:</span>
                            <span class="spec-value" th:text="${perfume.occasion}"></span>
                        </div>
                    </div>
                    
                    <div class="perfume-price" th:text="'$' + ${#numbers.formatDecimal(perfume.price, 1, 2)}"></div>
                    
                    <a th:href="'/customer/products/' + ${perfume.productId}" class="btn-add-cart">
                        View & Add to Cart 🛒
                    </a>
                </div>
            </div>
        </th:block>
    </div>
    
    <div class="action-buttons">
        <button onclick="location.href='/customer/quiz/start'" class="btn-secondary-action">
            Retake Quiz
        </button>
        <button onclick="location.href='/customer/products'" class="btn-secondary-action">
            Browse All Perfumes
        </button>
        <button onclick="location.href='/customer/dashboard'" class="btn-secondary-action">
            Back to Dashboard
        </button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        // Confetti animation
        function celebrateWithConfetti() {
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '9999';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            const particles = [];
            
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: -10,
                    vx: (Math.random() - 0.5) * 8,
                    vy: Math.random() * 5 + 5,
                    life: 1
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach((p, i) => {
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life -= 0.01;
                    
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = ['#667eea', '#764ba2', '#f093fb', '#4facfe'][Math.floor(Math.random() * 4)];
                    ctx.fillRect(p.x, p.y, 10, 10);
                    
                    if (p.life <= 0) particles.splice(i, 1);
                });
                
                if (particles.length > 0) {
                    requestAnimationFrame(animate);
                } else {
                    canvas.remove();
                }
            }
            
            animate();
        }
        
        window.addEventListener('load', celebrateWithConfetti);
    </script>
</body>
</html>
