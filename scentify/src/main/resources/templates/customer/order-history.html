<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Order History - Scentify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #C4A484;
            --primary-dark: #B89673;
            --secondary-color: #E6D3C1;
            --accent-color: #FAF7F4;
            --text-dark: #3E3A36;
            --text-muted: #8A7F75;
            --gold: #DAA520;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            background: white;
            border-bottom: 1px solid #f0f0f0;
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar .container-fluid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
            flex-wrap: wrap;
        }

        .navbar-brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark) !important;
        }

        .navbar .ms-auto {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-link {
            color: var(--text-dark) !important;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.4rem 0.6rem;
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--primary-color) !important;
        }

        .nav-link.active {
            color: var(--primary-color) !important;
            font-weight: 700;
        }

        .logout-btn {
            background: #2C2C2C;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }

        .logout-btn:hover {
            background: #1a1a1a;
            color: white;
        }

        .membership-badge {
            background: linear-gradient(135deg, #c2a98d, #b49374);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .join-membership-btn {
            background: linear-gradient(135deg, #c2a98d, #b49374);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            text-decoration: none;
            white-space: nowrap;
        }

        .pending-badge {
            background: #fff3cd;
            color: #856404;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }

        /* ================= MAIN CONTAINER ================= */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1rem 2rem 1rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .page-title i {
            color: var(--primary-color);
        }

        /* ================= ORDERS SECTION ================= */
        .orders-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* ================= ORDER CARD ================= */
        .order-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid var(--secondary-color);
        }

        .order-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            border-color: var(--primary-color);
        }

        .order-header {
            background: var(--accent-color);
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .order-header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .order-id {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .order-date {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .order-date i {
            margin-right: 0.3rem;
        }

        .order-header-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .order-status-badge {
            display: inline-block;
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .status-paid {
            background: #d4edda;
            color: #155724;
        }

        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .delivery-date {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .delivery-date i {
            color: #28a745;
            margin-right: 0.3rem;
        }

        /* ================= ORDER BODY ================= */
        .order-body {
            padding: 1.25rem;
        }

        /* ================= ORDER ITEMS ================= */
        .order-items {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 0.8rem;
            background: var(--accent-color);
            border-radius: 6px;
            transition: all 0.3s;
        }

        .order-item:hover {
            background: var(--secondary-color);
        }

        .order-item-image {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 4px;
            background: white;
            border: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .order-item-details {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .order-item-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .order-item-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .order-item-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .order-item-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .order-item-subtotal {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        /* ================= ORDER ITEM ACTIONS ================= */
        .order-item-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .btn-review-product {
            background: var(--primary-color);
            color: white;
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .btn-review-product:hover {
            background: var(--primary-dark);
            color: white;
            text-decoration: none;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(196, 164, 132, 0.3);
        }

        .btn-review-product.reviewed {
            background: #6c757d;
            cursor: default;
        }

        .btn-review-product.reviewed:hover {
            background: #6c757d;
            transform: none;
            box-shadow: none;
        }

        /* ================= ORDER FOOTER ================= */
        .order-footer {
            padding: 0.75rem 1.25rem;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            background: var(--accent-color);
            border-radius: 0 0 8px 8px;
        }

        .order-footer-left {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .order-shipping {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .order-shipping i {
            color: var(--primary-color);
            margin-right: 0.5rem;
        }

        .order-footer-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .order-total {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .order-total span {
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .btn-invoice {
            background: #6c757d;
            color: white;
            padding: 0.35rem 1rem;
            border: none;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-invoice:hover {
            background: #5a6268;
            color: white;
            text-decoration: none;
            transform: translateY(-1px);
        }

        /* ================= EMPTY STATE ================= */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3.5rem;
            margin-bottom: 0.75rem;
            color: var(--secondary-color);
        }

        .empty-state-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .empty-state-description {
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .btn-continue-shopping {
            background: var(--primary-color);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-continue-shopping:hover {
            background: var(--primary-dark);
            color: white;
            text-decoration: none;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(196, 164, 132, 0.3);
        }

        /* ================= RESPONSIVE ================= */
        @media (min-width: 992px) {
            .navbar .container-fluid { padding: 0 2rem; }
            .main-container { padding: 1.5rem 2rem 3rem 2rem; }
            .page-title { font-size: 2rem; }
        }

        @media (max-width: 768px) {
            .order-header {
                flex-direction: column;
                align-items: stretch;
            }

            .order-header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.3rem;
            }

            .order-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.6rem;
            }

            .order-item-image {
                width: 100%;
                height: 120px;
            }

            .order-item-details {
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
            }

            .order-item-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .order-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .order-footer-right {
                justify-content: space-between;
                width: 100%;
            }

            .main-container {
                padding: 0.75rem;
            }

            .navbar .container-fluid {
                padding: 0 0.75rem;
            }

            .nav-link {
                font-size: 0.75rem;
                padding: 0.3rem 0.4rem;
            }

            .logout-btn {
                font-size: 0.75rem;
                padding: 0.3rem 0.7rem;
            }

            .membership-badge, .join-membership-btn, .pending-badge {
                font-size: 0.65rem;
                padding: 0.2rem 0.6rem;
            }
        }

        @media (max-width: 576px) {
            .order-item-meta {
                flex-direction: column;
                gap: 0.2rem;
            }

            .order-id {
                font-size: 0.9rem;
            }

            .order-footer-right {
                flex-direction: column;
                align-items: stretch;
                gap: 0.4rem;
            }

            .btn-review-product,
            .btn-invoice {
                width: 100%;
                justify-content: center;
            }

            .order-total {
                text-align: center;
            }

            .empty-state {
                padding: 2rem 1rem;
            }

            .empty-state-icon {
                font-size: 2.5rem;
            }

            .empty-state-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="/customer/dashboard">
                <i class="fas fa-leaf"></i> Scentify
            </a>
            <div class="ms-auto d-flex align-items-center gap-1 gap-sm-2 flex-wrap">
                <a class="nav-link" href="/customer/dashboard"><i class="fas fa-home"></i> <span class="d-none d-sm-inline">Home</span></a>
                <a class="nav-link" href="/customer/cart"><i class="fas fa-shopping-cart"></i> <span class="d-none d-sm-inline">Cart</span></a>
                <a class="nav-link active" href="/customer/order-history"><i class="fas fa-list"></i> <span class="d-none d-sm-inline">Orders</span></a>
                <a class="nav-link" href="/customer/about"><i class="fas fa-info-circle"></i> <span class="d-none d-sm-inline">About</span></a>
                
                <!-- Membership / Premium -->
                <span th:if="${customer != null and customer.isMember == true}" class="membership-badge">
                    <i class="fas fa-crown"></i> Premium
                </span>
                <a th:if="${customer != null and customer.isMember == false and membershipApplication == null}" 
                   href="/customer/apply-membership" class="join-membership-btn">
                    <i class="fas fa-crown"></i> Join
                </a>
                <span th:if="${membershipApplication != null and membershipApplication.status == 'PENDING'}" 
                      class="pending-badge">
                    <i class="fas fa-hourglass-half"></i> Pending
                </span>
                <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Log Out</a>
            </div>
        </div>
    </nav>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="main-container">
        <h1 class="page-title">
            <i class="fas fa-history"></i> Order History
            <span style="font-size: 0.9rem; font-weight: 400; color: var(--text-muted); margin-left: 0.5rem;">
                (<span th:text="${orders != null ? orders.size() : 0}">0</span> orders)
            </span>
        </h1>

        <!-- Empty State -->
        <div th:if="${orders == null or orders.isEmpty()}" class="empty-state">
            <div class="empty-state-icon">
                <i class="fas fa-shopping-bag"></i>
            </div>
            <h2 class="empty-state-title">No Orders Yet</h2>
            <p class="empty-state-description">You haven't made any purchases yet. Start shopping for your perfect fragrance!</p>
            <a href="/customer/dashboard" class="btn-continue-shopping">
                <i class="fas fa-arrow-left"></i> Continue Shopping
            </a>
        </div>

        <!-- Orders List -->
        <div th:if="${orders != null and !orders.isEmpty()}" class="orders-section">
            <div th:each="order : ${orders}" class="order-card">
                <!-- Order Header -->
                <div class="order-header">
                    <div class="order-header-left">
                        <span class="order-id">#<span th:text="${order.orderId}"></span></span>
                        <span class="order-date">
                            <i class="far fa-calendar-alt"></i> 
                            <span th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}"></span>
                        </span>
                        <span th:if="${order.deliveryDate != null}" class="delivery-date">
                            <i class="fas fa-check-circle"></i> 
                            <span th:text="${#temporals.format(order.deliveryDate, 'dd MMM yyyy, hh:mm a')}"></span>
                        </span>
                    </div>
                    <div class="order-header-right">
                        <span class="order-status-badge" 
                              th:class="|order-status-badge status-${order.paymentStatus.toLowerCase()}|"
                              th:text="${order.paymentStatus}"></span>
                        <span class="order-status-badge" 
                              th:class="|order-status-badge status-${order.orderStatus.toLowerCase()}|"
                              th:text="${order.orderStatus}"></span>
                    </div>
                </div>

                <!-- Order Body - Multiple Items -->
                <div class="order-body">
                    <div class="order-items">
                        <div th:each="item : ${order.orderItems}" class="order-item">
                            <!-- Product Image -->
                            <img th:src="${item.product.prodimage}" 
                                 alt="Product" 
                                 class="order-item-image"
                                 onerror="this.src='https://via.placeholder.com/64x64?text=No+Image'">
                            
                            <!-- Product Details -->
                            <div class="order-item-details">
                                <!-- Left: Product Info -->
                                <div class="order-item-info">
                                    <div class="order-item-name" th:text="${item.product.productName}">Product Name</div>
                                    <div class="order-item-meta">
                                        <span><i class="fas fa-box"></i> <strong th:text="${item.quantity}">1</strong></span>
                                        <span><i class="fas fa-tag"></i> RM <span th:text="${#numbers.formatDecimal(item.price, 1, 2)}">0.00</span></span>
                                        <span class="order-item-subtotal">
                                            <i class="fas fa-calculator"></i> RM <span th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}">0.00</span>
                                        </span>
                                    </div>
                                </div>
                                
                                <!-- Right: Review Button -->
                                <div class="order-item-actions">
                                    <th:block th:with="productId=${item.product.productId}, 
                                                         isReviewed=${reviewedProductIds != null and reviewedProductIds.contains(productId)}">
                                        
                                        <a th:if="${order.paymentStatus == 'PAID' and !isReviewed}" 
                                           th:href="'/customer/product/' + ${productId} + '?review=true'" 
                                           class="btn-review-product">
                                            <i class="fas fa-star"></i> Write Review
                                        </a>
                                        
                                        <span th:if="${order.paymentStatus == 'PAID' and isReviewed}" 
                                              class="btn-review-product reviewed">
                                            <i class="fas fa-check-circle"></i> Reviewed
                                        </span>
                                    </th:block>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Footer -->
                <div class="order-footer">
                    <div class="order-footer-left">
                        <div th:if="${order.shippingAddress != null}" class="order-shipping">
                            <i class="fas fa-shipping-fast"></i> 
                            <span th:text="${order.shippingAddress}"></span>
                        </div>
                    </div>
                    <div class="order-footer-right">
                        <div class="order-total">
                            Total: <span>RM <span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}">0.00</span></span>
                        </div>
                        <a th:if="${order.paymentStatus == 'PAID'}" 
                           th:href="'/payment/invoice/order/' + ${order.orderId}" 
                           class="btn-invoice">
                            <i class="fas fa-file-invoice"></i> Invoice
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
