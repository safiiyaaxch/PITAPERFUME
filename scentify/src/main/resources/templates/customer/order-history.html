<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Scentify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #C4A484;      /* beige */
            --secondary-color: #E6D3C1;    /* soft nude */
            --accent-color: #FAF7F4;       /* cream */
            --text-dark: #3E3A36;
            --text-muted: #8A7F75;
        }

        body {
            background-color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            color: var(--text-dark);
        }

        /* ================= NAVBAR ================= */
        .navbar {
            background: white;
            border-bottom: 1px solid #f0f0f0;
            padding: 1rem 0;
        }

        .navbar .container-fluid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark) !important;
        }

        .nav-link {
            color: var(--text-dark) !important;
            font-weight: 500;
            margin: 0 1rem;
            cursor: pointer;
        }

        .nav-link:hover {
            color: var(--primary-color) !important;
        }

        .logout-btn {
            background: var(--primary-color);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #B89673;
            color: white;
            text-decoration: none;
        }

        .membership-badge {
            background: var(--primary-color);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* ================= MAIN CONTAINER ================= */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-dark);
        }

        /* ================= ORDERS TABLE ================= */
        .orders-section {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0;
        }

        .orders-table thead {
            background: var(--secondary-color);
        }

        .orders-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-dark);
            border-bottom: 2px solid var(--primary-color);
        }

        .orders-table td {
            padding: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .orders-table tbody tr:hover {
            background: #fafafa;
        }

        .order-id {
            font-weight: 600;
            color: var(--primary-color);
        }

        .order-date {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .order-status {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }

        .status-paid {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .product-image-small {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            background: var(--accent-color);
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .product-price {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-review {
            background: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-review:hover {
            background: #B89673;
            color: white;
            text-decoration: none;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--secondary-color);
        }

        .empty-state-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .empty-state-description {
            margin-bottom: 2rem;
            color: var(--text-muted);
        }

        .back-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: #B89673;
        }

        @media (max-width: 768px) {
            .orders-table {
                font-size: 0.9rem;
            }

            .orders-table th,
            .orders-table td {
                padding: 0.75rem;
            }

            .product-image-small {
                width: 50px;
                height: 50px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-review {
                width: 100%;
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-user-circle"></i> Scentify
            </span>
            <div class="ms-auto d-flex align-items-center gap-3">
                <a class="nav-link" href="/customer/dashboard">Home</a>
                <a class="nav-link" href="/customer/cart">
                    <i class="fas fa-shopping-cart"></i> Cart
                </a>
                <a class="nav-link" href="/customer/order-history" style="color: var(--primary-color) !important; font-weight: 700;">Order History</a>
                <a class="nav-link" href="#">About Us</a>
                <a th:if="${customer.isMember == false}" 
                   href="/customer/apply-membership" 
                   class="join-membership-btn"
                   style="background: var(--primary-color); color: white; padding: 0.6rem 1.5rem; border-radius: 4px; text-decoration: none;">
                    <i class="fas fa-crown"></i> Join Membership
                </a>
                <span th:if="${customer.isMember == true}" class="membership-badge">
                    <i class="fas fa-crown"></i> Premium Member
                </span>
                <a href="/logout" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Log Out
                </a>
            </div>
        </div>
    </nav>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="main-container">
        <h1 class="page-title">
            <i class="fas fa-history"></i> Order History
        </h1>

        <!-- Empty State -->
        <div th:if="${orders.isEmpty()}" class="empty-state">
            <div class="empty-state-icon">
                <i class="fas fa-shopping-bag"></i>
            </div>
            <h2 class="empty-state-title">No Orders Yet</h2>
            <p class="empty-state-description">You haven't made any purchases yet. Start shopping!</p>
            <a href="/customer/dashboard" class="btn-review" style="display: inline-block;">
                <i class="fas fa-arrow-left"></i> Continue Shopping
            </a>
        </div>

        <!-- Orders Table -->
        <div th:if="!${orders.isEmpty()}" class="orders-section">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Order Date</th>
                        <th>Payment Status</th>
                        <th>Order Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td>
                            <span class="order-id">#<span th:text="${order.orderId}"></span></span>
                        </td>
                        <td>
                            <div class="product-cell">
                                <img th:src="${order.product.prodimage}" 
                                     alt="Product" 
                                     class="product-image-small"
                                     onerror="this.style.display='none'">
                                <div class="product-info">
                                    <div class="product-name" th:text="${order.product.productName}"></div>
                                    <div class="product-price">RM <span th:text="${order.product.price}"></span></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <strong>RM <span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span></strong>
                        </td>
                        <td>
                            <span class="order-date" th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy')}"></span>
                        </td>
                        <td>
                            <span class="order-status" 
                                  th:class="|order-status status-${order.paymentStatus.toLowerCase()}|"
                                  th:text="${order.paymentStatus}"></span>
                        </td>
                        <td>
                            <span class="order-status" 
                                  th:class="|order-status status-${order.orderStatus.toLowerCase()}|"
                                  th:text="${order.orderStatus}"></span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a th:href="'/customer/product/' + ${order.product.productId}" 
                                   class="btn-review"
                                   title="Write a review for this product">
                                    <i class="fas fa-star"></i> Review
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
